{% extends "base.html" %}

{% block title %}Login · dj_chat{% endblock %}

{% block content %}
<section class="auth">
	<div class="card">
		<h1>Willkommen zurück</h1>
		<p class="subtitle">Melde dich an, um deine Chats zu sehen.</p>

		{% if error %}
		<p class="error-banner">{{ error }}</p>
		{% endif %}

		<form method="post" class="form">
			{% csrf_token %}
			<label class="field">
				<span>Benutzername</span>
				<input type="text" name="username" placeholder="Benutzername" required autofocus>
			</label>
			<label class="field">
				<span>Passwort</span>
				<input type="password" name="password" placeholder="Passwort" required>
			</label>
			<button type="submit" class="btn btn-primary btn-block">Login</button>
		</form>

		<p class="form-footer">Noch kein Konto? <a href="/register/">Registrieren</a></p>
	</div>
</section>
{% endblock %}
