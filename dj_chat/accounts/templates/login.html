<!DOCTYPE html>
<html>
<body>

<h1>login</h1>

<p> {{error}} </p>

<form method ="post">
	{% csrf_token %}

	<input
			type="text"
			name="username"
			placeholder="Benutzername"
		>
	<br><br>

	<input
			type="password"
			name="password"
			placeholder="Passwort"
		>

	<br><br>

	<button type="submit">
		Login
	</button>

	<a href = "/register/">
		Registrieren
	</a>

</body>
</html>
