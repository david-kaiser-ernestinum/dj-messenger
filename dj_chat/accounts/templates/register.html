<!-- Diese Datei geht aus der base.html Datei hervor --> 
{% extends "base.html" %}

{% block title %}Registrieren · dj_chat{% endblock %}

<!-- Inhalt der Registrierungsseite --> 
{% block content %}
<section class="auth">
	<div class="card">
		<h1>Konto erstellen</h1>
		<p class="subtitle">Leg dir einen Account an und leg direkt los.</p>

		<!-- Anzeigen möglicher Fehler --> 
		{% if error %}
		<p class="error-banner">{{ error }}</p>
		{% endif %}

		<!-- POST-Request zum Erstellen von einem Account --> 
		<form method="post" class="form">
			{% csrf_token %}
			<label class="field">
				<span>Benutzername</span>
				<input type="text" name="username" placeholder="Benutzername" required autofocus>
			</label>
			<label class="field">
				<span>Passwort</span>
				<input type="password" name="password" placeholder="Passwort" required>
			</label>
			<button type="submit" class="btn btn-primary btn-block">Registrieren</button>
		</form>

		<p class="form-footer">Schon registriert? <a href="/login/">Login</a></p>
	</div>
</section>
{% endblock %}
